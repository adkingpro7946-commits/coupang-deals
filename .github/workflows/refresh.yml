name: 상품 데이터 갱신

# 가격이 수시로 바뀌므로 주기적으로 다시 수집한다.
#
# ⚠ 자동 예약(schedule)은 꺼져 있다. 현재는 로컬 PC의 작업 스케줄러
#   (scripts/refresh-and-push.ps1)가 매일 갱신을 담당하므로, 시크릿 없이도 돌아간다.
#
# 클라우드에서 자동으로 돌리고 싶다면:
#   1) 저장소 Settings > Secrets 에 COUPANG_ACCESS_KEY / COUPANG_SECRET_KEY 등록
#   2) 아래 schedule 주석을 해제
# 시크릿이 없는 상태에서 schedule 을 켜면 매일 실패 메일이 오니 주의.
on:
  # schedule:
  #   - cron: '0 21,9 * * *' # UTC 21:00 / 09:00 = KST 06:00 / 18:00
  workflow_dispatch: # 수동 실행 (Actions 탭에서 Run workflow)

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 상품 수집
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_SUB_ID: ${{ vars.COUPANG_SUB_ID }}
        # 수집 키워드는 scripts/keywords.txt 에서 읽는다(한 줄에 하나).
        run: node scripts/fetch-products.mjs

      - name: 카테고리 SEO 페이지 생성
        env:
          # 배포 도메인을 리포지토리 Variables 의 SITE_URL 에 넣으면 canonical/sitemap 에 반영된다.
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/build-pages.mjs

      - name: 변경분 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json c sitemap.xml
          # generatedAt만 바뀐 경우까지 커밋하면 히스토리가 지저분해진다.
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 상품 데이터 갱신 $(date -u +%Y-%m-%d\ %H:%M) UTC"
            git push
          fi
