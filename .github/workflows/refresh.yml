name: 상품 데이터 갱신

# 가격이 수시로 바뀌므로 주기적으로 다시 수집한다.
# "가격 내림" 배지는 직전 커밋의 products.json과 비교해서 붙으므로,
# 이 워크플로가 돌아야 의미가 생긴다.
on:
  schedule:
    - cron: '0 21,9 * * *' # UTC 21:00 / 09:00 = KST 06:00 / 18:00
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 상품 수집
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_SUB_ID: ${{ vars.COUPANG_SUB_ID }}
        # 수집할 키워드/카테고리는 여기서 조정한다.
        run: node scripts/fetch-products.mjs --keywords "무선이어폰,캠핑용품,보조배터리"

      - name: 카테고리 SEO 페이지 생성
        env:
          # 배포 도메인을 리포지토리 Variables 의 SITE_URL 에 넣으면 canonical/sitemap 에 반영된다.
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/build-pages.mjs

      - name: 변경분 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json c sitemap.xml
          # generatedAt만 바뀐 경우까지 커밋하면 히스토리가 지저분해진다.
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 상품 데이터 갱신 $(date -u +%Y-%m-%d\ %H:%M) UTC"
            git push
          fi
